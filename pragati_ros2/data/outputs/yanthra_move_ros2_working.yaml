yanthra_move:
  ros__parameters:
    # Core parameters from working ROS1 config
    CAPTURE_MODE: 3.0
    YanthraDisparityShift: 15.0
    UsePostProcessingFilter: true
    UseThresholdFilter: false
    UseSpatialFilter: true
    SpatialFilterHoleFillingMode: 1.0
    TemporalFilterPersistenceControl: 7.0
    UseTemporalFilter: false
    PRAGATI_BYPASS_INTERNAL_PROCESSING: false
    hardware_timeout: 150000.0  # 10s hardware timeout (from ROS1)
    
    # Calibration and operation control
    arm_calibration: false
    YoloThreshold: 0.55
    continous_operation: false  # DISABLED to prevent infinite loop during testing
    YanthraLabCalibrationTesting: false
    
    # Hardware control (adjusted for testing)
    global_vaccum_motor: true
    end_effector_enable: true
    save_logs: false
    reverse_endeffector: false  # Different from ROS2 default
    jerk_enabled_theta: false
    jerk_enabled_phi: false
    parking_on: true
    
    # Timing parameters from ROS1
    l2_homing_sleep_time: 6.0
    l2_step_sleep_time: 5.0
    l2_idle_sleep_time: 2.0
    min_sleep_time_formotor_motion: 0.5
    
    # Joint control
    joint_velocity: 1.0
    # Using the ROS1 joint pose that worked
    joint_poses: [[0.00001, 0.001, 1.5708]]
    
    # Delays (converted to ROS2 format)
    delays:
      picking: 0.200
      pre_start_len: 0.025
      end_effector_runtime: 1000.0
      back_valve_close_delay: 100.0  # Using ROS1 value instead of 500
      EERunTimeDuringL5ForwardMovement: 1.0
      EERunTimeDuringL5BackwardMovement: 0.5
      
    # Joint initialization (adapted from ROS1)
    joint2_init:
      height_scan_enable: false
      min: 0.01
      max: 0.85
      step: 0.125
      
    joint3_init:
      park_position: 0.10  # From ROS1
      homing_position: 0.00001
      multiple_zero_poses: true
      zero_poses: [0.261799]  # From ROS1
      
    joint4_init:
      park_position: 0.2  # From ROS1
      homing_position: 0.00001
      multiple_zero_poses: false
      theta_jerk_value: 0.0
      
    joint5_init:
      park_position: 0.001  # From ROS1
      homing_position: 0.00001
      end_effector_len: 0.085  # From ROS1 (working length)
      joint5_vel_limit: 1.1  # From ROS1
      min_length: 0.162  # From ROS1
      max_length: 0.601  # From ROS1
      gear_ratio: 20.943933333
      phi_jerk_value: 0.0
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --cov=vehicle_control
    --cov-report=term-missing
    --cov-report=html:build/pytest_coverage_html
    --cov-report=xml:build/pytest_coverage.xml
    --cov-branch
    --tb=short
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests

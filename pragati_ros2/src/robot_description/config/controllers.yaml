controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    # Controllers to auto-load on startup
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


# Joint State Broadcaster Configuration
joint_state_broadcaster:
  ros__parameters:
    joints:
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
    interfaces:
      - position
      - velocity


# Joint Trajectory Controller Configuration
joint_trajectory_controller:
  ros__parameters:
    joints:
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

      # Joint 2 - Prismatic Z-axis
      "joint2":
        trajectory: 0.05
        goal: 0.01

      # Joint 3 - Revolute
      "joint3":
        trajectory: 0.1
        goal: 0.05

      # Joint 4 - Prismatic Y-axis
      "joint4":
        trajectory: 0.05
        goal: 0.01

      # Joint 5 - Prismatic (gripper)
      "joint5":
        trajectory: 0.02
        goal: 0.005

# Logrotate configuration for Pragati ROS2 project
# Usage: logrotate -s /home/uday/Downloads/pragati_ros2/logs/.logrotate_status /home/uday/Downloads/pragati_ros2/config/logrotate.conf

/home/uday/Downloads/pragati_ros2/logs/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        echo "Log rotation completed on $(date)" >> /home/uday/Downloads/pragati_ros2/logs/logrotate.log
    endscript
}

/home/uday/Downloads/pragati_ros2/logs/*/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    size 10M
}

/home/uday/Downloads/pragati_ros2/logs/ros2/* {
    weekly
    missingok
    rotate 4
    compress
    delaycompress
    notifempty
    size 50M
    sharedscripts
}
